<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Puzzles de Tanyi</title>
  <link rel="stylesheet" href="css/base1.css">
  <link rel="stylesheet" href="css/puzzle.css">
</head>
<body>
  <header class="header">
    <div class="logo">
      <img src="img/logo1.png" alt="Logo Tanyi">
      <div class="logo-text">El Mundo de Tanyi</div>
    </div>
  
  </header>

  <div class="content"> 
  <!-- Barra de carga animada -->
  <div class="loading-bar"></div>

  <h1>🧩 Puzzles de Tanyi</h1>

  <div class="image-selector">
    <img src="img/Lazo_lunares.png" alt="Puzzle 1" class="preview" onclick="selectImage('img/Lazo_lunares.png')" />
    <img src="img/durmiendo.png" alt="Puzzle 2" class="preview" onclick="selectImage('img/durmiendo.png')" />
    <img src="img/morder.png" alt="Puzzle 3" class="preview" onclick="selectImage('img/morder.png')" />
    
  </div>

    <div id="puzzleName">Lazo con lunares</div>
    
  <div class="container">
<!-- Imagen actual -->
  <div class="preview-area">
    <img id="selectedImage" class="preview" src="img/Lazo_lunares.png" alt="Vista previa" />
  </div>

<!-- Contenedor del puzzle -->
  <div class="puzzle-container" id="puzzle"></div>
</div>

<nav class="navigation">
  <button onclick="initPuzzle()">Reiniciar Puzzle</button>
  <button onclick="location.href='portada.html'">📖 Cuento</button>
  <button onclick="location.href='menu.html'">🏠 Menú Principal</button>
</nav>

  <footer class="footer">
    
    <div class="copyright">
      © 2025 El Mundo de Tanyi - Donde la imaginación cobra vida
    </div>
    
  </footer>

<script src="js/puzzle.js"></script>
</body>
</html>
